name: 公告正文抓取分片

on:
  workflow_call:
    inputs:
      lane:
        description: "Outer matrix lane id"
        required: true
        type: string
      batches_matrix:
        description: "Inner batch matrix JSON for this lane"
        required: true
        type: string
      max_parallel:
        description: "Max parallel batch jobs inside this lane"
        required: true
        type: number

permissions:
  contents: read

jobs:
  fetch_content:
    name: ${{ inputs.lane }} / ${{ matrix.batch }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel }}
      matrix: ${{ fromJson(inputs.batches_matrix) }}
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          {
            echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data"
            echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos"
            echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3; do
            if python -m pip install ./my-stock-src; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 5
          done

      - name: Download batch files
        uses: actions/download-artifact@v5
        with:
          name: announce-content-batches
          path: ${{ runner.temp }}/content-batches

      - name: Fetch content for batch
        run: |
          BATCH_FILE="${RUNNER_TEMP}/content-batches/${{ matrix.batch }}"
          RUNNER_IDX=$(echo "${{ matrix.batch }}" | sed -n 's/batch_\([0-9]*\)\..*/\1/p')
          python -m my_stock announce fetch-content-worker \
            --codes-file "${BATCH_FILE}" \
            --runner-idx "${RUNNER_IDX}" \
            --output-dir "${RUNNER_TEMP}/content_output" \
            --timeout 10 \
            --summary-output "${RUNNER_TEMP}/announce-content-summary.json"

      - name: Upload content artifact
        uses: actions/upload-artifact@v4
        with:
          name: announce-content-${{ inputs.lane }}-${{ matrix.batch }}
          path: ${{ runner.temp }}/content_output/
          retention-days: 1
          if-no-files-found: warn
