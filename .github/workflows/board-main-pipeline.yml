name: 板块主链刷新

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "日期范围，支持 2019~2025 / 202601~202603 / 20260401~20260404；留空时默认当天到当天"
        required: false
        default: ""
        type: string
      snapshot_date:
        description: "映射快照日期 YYYY-MM-DD；留空时默认使用最新可用快照"
        required: false
        default: ""
        type: string
      shard_total:
        description: "抓取并行分片数（每个分片一个独立 runner/IP）；默认 20，限流严重时可调到 60"
        required: false
        default: "20"
        type: string
  # schedule:
  #   - cron: "45 12 * * 1-5"

permissions:
  contents: write

concurrency:
  group: board-main-pipeline
  cancel-in-progress: false

jobs:
  resolve_inputs:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.range.outputs.start }}
      end: ${{ steps.range.outputs.end }}
      partition_grain: ${{ steps.range.outputs.partition_grain }}
      should_run: ${{ steps.range.outputs.should_run }}
      skip_reason: ${{ steps.range.outputs.skip_reason }}
      snapshot_date: ${{ steps.range.outputs.snapshot_date }}
      shard_total: ${{ steps.shards.outputs.shard_total }}
      shard_matrix: ${{ steps.shards.outputs.shard_matrix }}
    env:
      INPUT_DATE_RANGE: ${{ github.event.inputs.date_range || '' }}
      INPUT_SNAPSHOT_DATE: ${{ github.event.inputs.snapshot_date || '' }}
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          python -m my_stock common resolve-date-range \
            --date-range "${INPUT_DATE_RANGE}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --workflow-name "board-main-pipeline" \
            --precision auto \
            --check-close \
            --snapshot-date "${INPUT_SNAPSHOT_DATE}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Generate shard matrix
        id: shards
        run: |
          TOTAL=${{ github.event.inputs.shard_total || '20' }}
          python -m my_stock common generate-shard-matrix \
            --total "${TOTAL}" \
            --github-output "$GITHUB_OUTPUT"

  skip_pipeline:
    runs-on: ubuntu-latest
    needs: resolve_inputs
    if: needs.resolve_inputs.outputs.should_run != 'true'
    steps:
      - name: Report skip reason
        run: |
          echo "${{ needs.resolve_inputs.outputs.skip_reason }}"

  fetch_history_shard:
    runs-on: ubuntu-latest
    needs: resolve_inputs
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.resolve_inputs.outputs.shard_matrix) }}
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_BOARD_REPO: gp-board
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      SHARD_TOTAL: ${{ needs.resolve_inputs.outputs.shard_total }}
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"
          echo "SHARD_OUTPUT=${RUNNER_TEMP}/shard-output" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync gp-board meta only
        run: |
          python -m my_stock common sync-repo gp-board \
            --sparse-path meta/board_codes.csv

      - name: Fetch board history (shard ${{ matrix.shard_index }})
        run: |
          python -m my_stock board fetch-history-binary \
            --meta "${GP_REPOS_ROOT}/gp-board/meta/board_codes.csv" \
            --output "${SHARD_OUTPUT}" \
            --manifest-path "${SHARD_OUTPUT}/manifest.json" \
            --failures-path "${SHARD_OUTPUT}/failures.json" \
            --binary-failures-path "${SHARD_OUTPUT}/failures_binary.json" \
            --start "${{ needs.resolve_inputs.outputs.start }}" \
            --end "${{ needs.resolve_inputs.outputs.end }}" \
            --partition-grain "${{ needs.resolve_inputs.outputs.partition_grain }}" \
            --shard-index "${{ matrix.shard_index }}" \
            --shard-total "${SHARD_TOTAL}" \
            --shuffle \
            --no-push \
            --summary-output "${SHARD_OUTPUT}/summary.json"

      - name: Upload shard output
        uses: actions/upload-artifact@v4
        with:
          name: board-raw-shard-${{ matrix.shard_index }}
          path: ${{ runner.temp }}/shard-output/
          if-no-files-found: warn
          retention-days: 3

  merge_history:
    runs-on: ubuntu-latest
    needs: [resolve_inputs, fetch_history_shard]
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 60
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_BOARD_REPO: gp-board
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync gp-board data repo
        run: |
          python -m my_stock common sync-repo gp-board \
            --sparse-path meta/board_codes.csv \
            --sparse-path raw/bk

      - name: Seed runtime raw board data from gp-board
        run: |
          python -m my_stock common seed-tree-copy \
            --source "${GP_REPOS_ROOT}/gp-board/raw/bk" \
            --target "${GP_RUNTIME_ROOT}/board/raw/bk"

      - name: Download all shard artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: board-raw-shard-*
          path: ${{ runner.temp }}/shards/

      - name: Merge shard outputs
        shell: bash
        env:
          PARTITION_GRAIN: ${{ needs.resolve_inputs.outputs.partition_grain }}
          START_DATE: ${{ needs.resolve_inputs.outputs.start }}
          END_DATE: ${{ needs.resolve_inputs.outputs.end }}
        run: |
          set -euo pipefail
          python -m my_stock board merge-history-shards \
            --shards-dir "${RUNNER_TEMP}/shards" \
            --output-dir "${GP_RUNTIME_ROOT}/board/raw/bk" \
            --meta-path "${GP_REPOS_ROOT}/gp-board/meta/board_codes.csv" \
            --start "${START_DATE}" \
            --end "${END_DATE}" \
            --partition-grain "${PARTITION_GRAIN}" \
            --summary-output "${RUNNER_TEMP}/board-binary-summary.json"

      - name: Publish runtime raw board data to gp-board
        run: |
          python -m my_stock common publish-tree \
            --source "${GP_RUNTIME_ROOT}/board/raw/bk" \
            --target "${GP_REPOS_ROOT}/gp-board/raw/bk" \
            --repo-dir "${GP_REPOS_ROOT}/gp-board" \
            --git-paths "raw/bk,meta/board_codes.csv" \
            --message "board: update ${{ needs.resolve_inputs.outputs.start }} to ${{ needs.resolve_inputs.outputs.end }}"

      - name: Upload history summary
        uses: actions/upload-artifact@v4
        with:
          name: board-history-summaries
          path: ${{ runner.temp }}/board-binary-summary.json
          if-no-files-found: error
          retention-days: 7

  build_features:
    runs-on: ubuntu-latest
    needs: [resolve_inputs, merge_history]
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 120
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_BOARD_REPO: gp-board
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync gp-board data repo
        run: |
          python -m my_stock common sync-repo gp-board \
            --sparse-path raw/bk \
            --sparse-path features/bk

      - name: Seed runtime board features from gp-board
        run: |
          python -m my_stock common seed-tree-copy \
            --source "${GP_REPOS_ROOT}/gp-board/features/bk" \
            --target "${GP_RUNTIME_ROOT}/board/features/bk"

      - name: Build board features  # L1a+L2H combined (extract_base_kline + derived features)
        run: |
          python -m my_stock board build-features \
            --input "${GP_REPOS_ROOT}/gp-board/raw/bk" \
            --output "${GP_RUNTIME_ROOT}/board/features/bk" \
            --manifest-path "${GP_RUNTIME_ROOT}/board/features/bk/manifest.json" \
            --start "${{ needs.resolve_inputs.outputs.start }}" \
            --end "${{ needs.resolve_inputs.outputs.end }}" \
            --partition-grain "${{ needs.resolve_inputs.outputs.partition_grain }}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/board-features-summary.json"

      - name: Publish runtime board features to gp-board
        run: |
          python -m my_stock common publish-tree \
            --source "${GP_RUNTIME_ROOT}/board/features/bk" \
            --target "${GP_REPOS_ROOT}/gp-board/features/bk" \
            --repo-dir "${GP_REPOS_ROOT}/gp-board" \
            --git-paths "features/bk" \
            --message "board-features: update ${{ needs.resolve_inputs.outputs.start }} to ${{ needs.resolve_inputs.outputs.end }}"

      - name: Upload feature summary
        uses: actions/upload-artifact@v4
        with:
          name: board-features-summary
          path: ${{ runner.temp }}/board-features-summary.json
          if-no-files-found: error
          retention-days: 7

  build_stock_features:
    runs-on: ubuntu-latest
    needs: [resolve_inputs, build_features]
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 120
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_BOARD_REPO: gp-board
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync gp-board data repo
        run: |
          python -m my_stock common sync-repo gp-board \
            --sparse-path features/bk \
            --sparse-path features/stock_daily \
            --sparse-path meta/stock_board_map

      - name: Seed runtime stock_daily features from gp-board
        run: |
          python -m my_stock common seed-tree-copy \
            --source "${GP_REPOS_ROOT}/gp-board/features/stock_daily" \
            --target "${GP_RUNTIME_ROOT}/board/features/stock_daily"

      - name: Build stock-level board features
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [ -n "${{ needs.resolve_inputs.outputs.snapshot_date }}" ]; then
            EXTRA_ARGS+=(--snapshot-date "${{ needs.resolve_inputs.outputs.snapshot_date }}")
          fi
          python -m my_stock board build-stock-features \
            --input "${GP_REPOS_ROOT}/gp-board/features/bk" \
            --stock-map-dir "${GP_REPOS_ROOT}/gp-board/meta/stock_board_map" \
            --output "${GP_RUNTIME_ROOT}/board/features/stock_daily" \
            --manifest-path "${GP_RUNTIME_ROOT}/board/features/stock_daily/manifest.json" \
            --start "${{ needs.resolve_inputs.outputs.start }}" \
            --end "${{ needs.resolve_inputs.outputs.end }}" \
            --partition-grain "${{ needs.resolve_inputs.outputs.partition_grain }}" \
            "${EXTRA_ARGS[@]}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/board-stock-features-summary.json"

      - name: Publish runtime stock_daily features to gp-board
        run: |
          python -m my_stock common publish-tree \
            --source "${GP_RUNTIME_ROOT}/board/features/stock_daily" \
            --target "${GP_REPOS_ROOT}/gp-board/features/stock_daily" \
            --repo-dir "${GP_REPOS_ROOT}/gp-board" \
            --git-paths "features/stock_daily" \
            --message "board-stock-features: update ${{ needs.resolve_inputs.outputs.start }} to ${{ needs.resolve_inputs.outputs.end }}"

      - name: Upload stock feature summary
        uses: actions/upload-artifact@v4
        with:
          name: board-stock-features-summary
          path: ${{ runner.temp }}/board-stock-features-summary.json
          if-no-files-found: error
          retention-days: 7
