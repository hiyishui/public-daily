name: 公告 raw 内容备份迁移

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        default: migrate-and-merge
        type: choice
        options:
          - migrate-and-merge   # 模式 1：迁移 backup + 从 action-private-backup 补齐缺失（默认）
          - migrate-only        # 模式 2：仅迁移 gp-announce-raw-<year>-backup
          - download-missing    # 模式 3：下载缺失公告并 upsert
      years:
        description: "年份列表，逗号分隔，例如 2019,2020,2021"
        required: true
        type: string
      shard_size:
        description: "[download-missing] 每个 shard 的公告数（默认 50）"
        required: false
        default: "50"
        type: string
      max_runners:
        description: "[download-missing] 最大并发 runner 数（默认 20）"
        required: false
        default: "20"
        type: string

permissions:
  contents: read

concurrency:
  group: migrate-announce-content-backup-${{ inputs.mode }}-${{ inputs.years }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # 模式 1/2 公共：按年并行迁移
  # ============================================================
  prepare-migrate:
    if: ${{ inputs.mode != 'download-missing' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_work: ${{ steps.build.outputs.has_work }}
    env:
      INPUT_YEARS: ${{ inputs.years }}
    steps:
      - name: Build year matrix
        id: build
        run: |
          python - <<'PY'
          import json, os
          raw = os.environ.get("INPUT_YEARS", "")
          years = sorted({t.strip() for t in raw.split(",") if t.strip()})
          for y in years:
              if not (len(y) == 4 and y.isdigit()):
                  raise SystemExit(f"invalid year: {y!r}")
          matrix = {"include": [{"year": y} for y in years]}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              fh.write(f"has_work={'true' if years else 'false'}\n")
          print("years:", years)
          PY

  migrate:
    if: ${{ inputs.mode != 'download-missing' && needs.prepare-migrate.outputs.has_work == 'true' }}
    needs: prepare-migrate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.prepare-migrate.outputs.matrix) }}
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - name: Check out my-stock source
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install my-stock
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Check out backup repo (read-only)
        uses: actions/checkout@v4
        with:
          repository: larkself/gp-announce-raw-${{ matrix.year }}-backup
          ref: main
          path: backup-src
          token: ${{ secrets.LARKSELF_PAT }}
          fetch-depth: 1

      - name: Check out target year repo
        uses: actions/checkout@v4
        with:
          repository: larkself/gp-announce-raw-${{ matrix.year }}
          ref: main
          path: target-src
          token: ${{ secrets.LARKSELF_PAT }}

      - name: Run migration (backup → target)
        run: |
          python -m my_stock announce migrate-content-backup \
            --year "${{ matrix.year }}" \
            --source-repo-dir "${GITHUB_WORKSPACE}/backup-src" \
            --target-repo-dir "${GITHUB_WORKSPACE}/target-src"

      - name: Sparse-clone action-private-backup repos
        if: ${{ inputs.mode == 'migrate-and-merge' }}
        env:
          YEAR: ${{ matrix.year }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/sources"
          python - <<'PY'
          import json, os, subprocess
          token_map_raw = os.environ.get("ACTION_DISPATCH_TOKEN_MAP", "")
          year = os.environ["YEAR"]
          sources_root = os.path.join(os.environ["RUNNER_TEMP"], "sources")
          owners = []
          for line in token_map_raw.splitlines():
              line = line.strip()
              if not line or not line.startswith("{"):
                  continue
              try:
                  obj = json.loads(line)
              except Exception as e:
                  print(f"skip malformed line: {e}", flush=True); continue
              owner, token = obj.get("owner"), obj.get("token")
              if owner and token:
                  owners.append((owner, token))
          print(f"found {len(owners)} owners", flush=True)
          for owner, token in owners:
              dest = os.path.join(sources_root, owner)
              if os.path.exists(dest):
                  continue
              repo = "action-private-backup"
              probe = subprocess.run(
                  ["curl", "-sS", "-o", "/dev/null", "-w", "%{http_code}",
                   "-H", f"Authorization: Bearer {token}",
                   f"https://api.github.com/repos/{owner}/{repo}"],
                  capture_output=True, text=True,
              )
              status = (probe.stdout or "").strip()
              if status != "200":
                  print(f"skip {owner}/{repo} (status={status})", flush=True); continue
              url = f"https://x-access-token:{token}@github.com/{owner}/{repo}.git"
              print(f"sparse-clone {owner}/{repo} ...", flush=True)
              try:
                  subprocess.run(
                      ["git", "clone", "--depth", "1", "--filter=blob:none",
                       "--sparse", "--no-checkout", url, dest], check=True,
                  )
                  subprocess.run(
                      ["git", "-C", dest, "sparse-checkout", "set",
                       f"results/announce/l0-content/{year}"], check=True,
                  )
                  subprocess.run(["git", "-C", dest, "checkout"], check=True)
              except subprocess.CalledProcessError as e:
                  print(f"clone failed for {owner}: {e}", flush=True)
                  subprocess.run(["rm", "-rf", dest], check=False)
          print("done", flush=True)
          PY

      - name: Merge missing from action-private (upsert + push)
        if: ${{ inputs.mode == 'migrate-and-merge' }}
        run: |
          python -m my_stock announce merge-missing-from-action-private \
            --year "${{ matrix.year }}" \
            --target-repo-dir "${GITHUB_WORKSPACE}/target-src" \
            --sources-root "${RUNNER_TEMP}/sources"

  # ============================================================
  # 模式 3：download-missing
  # ============================================================
  prepare-download:
    if: ${{ inputs.mode == 'download-missing' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_work: ${{ steps.build.outputs.has_work }}
    env:
      INPUT_YEARS: ${{ inputs.years }}
      SHARD_SIZE: ${{ inputs.shard_size }}
      MAX_RUNNERS: ${{ inputs.max_runners }}
      LARK_PAT: ${{ secrets.LARKSELF_PAT }}
      HIY_PAT: ${{ secrets.HIYISHUI_PAT }}
    steps:
      - name: Check out my-stock source
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install my-stock
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Build per-year shard files
        id: build
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path

          years_raw = os.environ.get("INPUT_YEARS", "")
          years = sorted({t.strip() for t in years_raw.split(",") if t.strip()})
          for y in years:
              if not (len(y) == 4 and y.isdigit()):
                  raise SystemExit(f"invalid year: {y!r}")
          shard_size = int(os.environ.get("SHARD_SIZE", "50"))
          max_runners = int(os.environ.get("MAX_RUNNERS", "20"))
          lark_pat = os.environ["LARK_PAT"]
          shards_root = Path(os.environ["RUNNER_TEMP"]) / "shards"
          shards_root.mkdir(parents=True, exist_ok=True)

          all_runners = []
          for year in years:
              repo_dir = Path(os.environ["RUNNER_TEMP"]) / "year-repo" / year
              repo_dir.parent.mkdir(parents=True, exist_ok=True)
              if repo_dir.exists():
                  subprocess.run(["rm", "-rf", str(repo_dir)], check=False)
              url = f"https://x-access-token:{lark_pat}@github.com/larkself/gp-announce-raw-{year}.git"
              # 仅需 missing JSON，sparse-checkout 该子目录
              subprocess.run(
                  ["git", "clone", "--depth", "1", "--filter=blob:none",
                   "--sparse", "--no-checkout", url, str(repo_dir)], check=True,
              )
              subprocess.run(
                  ["git", "-C", str(repo_dir), "sparse-checkout", "set",
                   "data/announce/missing"], check=True,
              )
              subprocess.run(["git", "-C", str(repo_dir), "checkout"], check=True)

              year_shards_dir = shards_root / year
              year_shards_dir.mkdir(parents=True, exist_ok=True)
              proc = subprocess.run(
                  ["python", "-m", "my_stock", "announce", "build-missing-runner-batches",
                   "--year", year,
                   "--target-repo-dir", str(repo_dir),
                   "--output-dir", str(year_shards_dir),
                   "--codes-per-runner", str(shard_size),
                   "--max-runners", str(max_runners)],
                  check=True, capture_output=True, text=True,
              )
              print(proc.stdout)
              data = json.loads(proc.stdout)
              for r in data.get("matrix", {}).get("include", []):
                  all_runners.append({
                      "year": year,
                      "runner_idx": r["runner_idx"],
                      "batch_file": r["batch_file"],
                      "size": r["size"],
                  })

          matrix = {"include": all_runners}
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
              fh.write(f"has_work={'true' if all_runners else 'false'}\n")
          print(f"total runners: {len(all_runners)}")
          PY

      - name: Upload shards artifact
        uses: actions/upload-artifact@v4
        with:
          name: missing-shards
          path: ${{ runner.temp }}/shards
          if-no-files-found: error
          retention-days: 1

  download-missing:
    if: ${{ inputs.mode == 'download-missing' && needs.prepare-download.outputs.has_work == 'true' }}
    needs: prepare-download
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare-download.outputs.matrix) }}
    steps:
      - name: Check out my-stock source
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install my-stock
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Download shards artifact
        uses: actions/download-artifact@v5
        with:
          name: missing-shards
          path: ${{ runner.temp }}/shards

      - name: Fetch content for shard
        env:
          YEAR: ${{ matrix.year }}
          RUNNER_IDX: ${{ matrix.runner_idx }}
          BATCH_FILE_NAME: ${{ matrix.batch_file }}
        run: |
          set -euo pipefail
          # 错峰启动：避免 20 个 runner 同时打 API
          STAGGER=$(( RUNNER_IDX * 3 ))
          if [ "$STAGGER" -gt 0 ]; then
            echo "[stagger] sleeping ${STAGGER}s"
            sleep "$STAGGER"
          fi
          BATCH_FILE="${RUNNER_TEMP}/shards/${YEAR}/${BATCH_FILE_NAME}"
          OUT_DIR="${RUNNER_TEMP}/dl-out"
          mkdir -p "${OUT_DIR}"
          python -m my_stock announce fetch-content-worker \
            --codes-file "${BATCH_FILE}" \
            --runner-idx "${RUNNER_IDX}" \
            --output-dir "${OUT_DIR}" \
            --summary-output "${RUNNER_TEMP}/dl-summary.json"

      - name: Upload runner output
        uses: actions/upload-artifact@v4
        with:
          name: download-missing-${{ matrix.year }}-${{ matrix.runner_idx }}
          path: ${{ runner.temp }}/dl-out
          if-no-files-found: warn
          retention-days: 1

  upsert-downloaded:
    if: ${{ inputs.mode == 'download-missing' && needs.prepare-download.outputs.has_work == 'true' }}
    needs: [prepare-download, download-missing]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      INPUT_YEARS: ${{ inputs.years }}
      LARK_PAT: ${{ secrets.LARKSELF_PAT }}
    steps:
      - name: Check out my-stock source
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install my-stock
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Download all runner artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: download-missing-*
          path: ${{ runner.temp }}/all-dl
          merge-multiple: true

      - name: Upsert per year and push
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, subprocess
          from pathlib import Path
          years = sorted({t.strip() for t in os.environ.get("INPUT_YEARS","").split(",") if t.strip()})
          lark_pat = os.environ["LARK_PAT"]
          dl_root = Path(os.environ["RUNNER_TEMP"]) / "all-dl"
          for year in years:
              repo_dir = Path(os.environ["RUNNER_TEMP"]) / "year-repo" / year
              repo_dir.parent.mkdir(parents=True, exist_ok=True)
              if repo_dir.exists():
                  subprocess.run(["rm", "-rf", str(repo_dir)], check=False)
              url = f"https://x-access-token:{lark_pat}@github.com/larkself/gp-announce-raw-{year}.git"
              subprocess.run(["git", "clone", "--depth", "1", url, str(repo_dir)], check=True)
              subprocess.run(["python", "-m", "my_stock", "announce",
                              "upsert-downloaded-content",
                              "--year", year,
                              "--target-repo-dir", str(repo_dir),
                              "--input-root", str(dl_root)], check=True)
          PY
