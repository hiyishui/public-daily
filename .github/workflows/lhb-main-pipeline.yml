name: 龙虎榜日常主链

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "日期范围 YYYYMMDD~YYYYMMDD；留空=当天（需已收盘）"
        required: false
        default: ""
        type: string
  # schedule:
  #   - cron: "30 8 * * 1-5"   # UTC 08:30 = CST 16:30

permissions:
  contents: write

concurrency:
  group: lhb-main-pipeline
  cancel-in-progress: false

# ────────────────────────────────────────────────────────────────
jobs:

  # ─── 1. resolve_inputs ───────────────────────────────────────
  resolve_inputs:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.range.outputs.start }}
      end: ${{ steps.range.outputs.end }}
      should_run: ${{ steps.range.outputs.should_run }}
      skip_reason: ${{ steps.range.outputs.skip_reason }}
    env:
      INPUT_DATE_RANGE: ${{ github.event.inputs.date_range || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Resolve date range
        id: range
        run: |
          set -euo pipefail
          python -m my_stock common resolve-date-range \
            --date-range "${INPUT_DATE_RANGE}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --workflow-name "lhb-main-pipeline" \
            --precision auto \
            --check-close \
            --github-output "$GITHUB_OUTPUT"

  # ─── 2. skip_pipeline ───────────────────────────────────────
  skip_pipeline:
    runs-on: ubuntu-latest
    needs: resolve_inputs
    if: needs.resolve_inputs.outputs.should_run != 'true'
    steps:
      - run: echo "${{ needs.resolve_inputs.outputs.skip_reason }}"

  # ─── 3. fetch_and_extract (L0 + L1) ─────────────────────────
  fetch_and_extract:
    runs-on: ubuntu-latest
    needs: resolve_inputs
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 30
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_LHB_REPO: gp-lhb
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      TARGET_DATE: ${{ needs.resolve_inputs.outputs.start }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync gp-lhb
        run: python -m my_stock common sync-repo gp-lhb

      # L0: fetch detail_em
      - name: "L0: Fetch detail_em"
        run: |
          python -m my_stock lhb fetch-range \
            --date "${TARGET_DATE}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/fetch-summary.json"

      # L1: extract base features → stock_daily
      - name: "L1: Extract base features"
        run: |
          python -m my_stock lhb extract-base-features \
            --start "${TARGET_DATE}" \
            --end "${TARGET_DATE}" \
            --detail-root "${GP_RUNTIME_ROOT}/lhb/detail_em" \
            --output-root "${RUNNER_TEMP}/lhb-stock-daily" \
            --summary-output "${RUNNER_TEMP}/extract-summary.json"

      # Publish detail_em → gp-lhb
      - name: Publish detail_em
        run: |
          python -m my_stock lhb publish-detail-em \
            --summary-path "${RUNNER_TEMP}/fetch-summary.json" \
            --start "${TARGET_DATE}" \
            --end "${TARGET_DATE}"

      # Publish stock_daily → gp-lhb
      - name: Publish stock_daily
        run: |
          python -m my_stock lhb publish-stock-daily \
            --summary-path "${RUNNER_TEMP}/extract-summary.json" \
            --start "${TARGET_DATE}" \
            --end "${TARGET_DATE}"

  # ─── 4. derive_history (L2H) ────────────────────────────────
  derive_history:
    runs-on: ubuntu-latest
    needs: [resolve_inputs, fetch_and_extract]
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 30
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_LHB_REPO: gp-lhb
      GP_LHB_DERIVED_REPO: gp-lhb-derived
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      TARGET_DATE: ${{ needs.resolve_inputs.outputs.start }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync gp-lhb
        run: python -m my_stock common sync-repo gp-lhb

      - name: Compute lookback start
        id: lookback
        run: |
          python -m my_stock common resolve-lookback-date \
            --date "${TARGET_DATE}" \
            --lookback 60 \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: "L2H: Derive history features"
        run: |
          python -m my_stock lhb derive-history-features \
            --start "${TARGET_DATE}" \
            --end "${TARGET_DATE}" \
            --lookback-start "${{ steps.lookback.outputs.lookback_start }}" \
            --input-root "${GP_REPOS_ROOT}/gp-lhb/data/lhb/stock_daily" \
            --output-root "${RUNNER_TEMP}/lhb-l2h-output" \
            --summary-output "${RUNNER_TEMP}/lhb-l2h-summary.json"

      - name: Sync gp-lhb-derived
        run: python -m my_stock common sync-repo gp-lhb-derived

      - name: Publish history-derived
        run: |
          python -m my_stock lhb publish-stock-daily \
            --summary-path "${RUNNER_TEMP}/lhb-l2h-summary.json" \
            --target-repo gp-lhb-derived \
            --repo-subdir history-derived \
            --start "${TARGET_DATE}" \
            --end "${TARGET_DATE}"

  # ─── 5. derive_future (L2F) — parallel with L2H ─────────────
  derive_future:
    runs-on: ubuntu-latest
    needs: [resolve_inputs, fetch_and_extract]
    if: needs.resolve_inputs.outputs.should_run == 'true'
    timeout-minutes: 30
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_LHB_REPO: gp-lhb
      GP_LHB_DERIVED_REPO: gp-lhb-derived
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync gp-lhb
        run: python -m my_stock common sync-repo gp-lhb

      - name: Compute L2F target date (T-11)
        id: l2f
        run: |
          python -m my_stock common resolve-future-trade-date \
            --offset 11 \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: "L2F: Derive future features"
        run: |
          python -m my_stock lhb derive-future-features \
            --date-range "${{ steps.l2f.outputs.target_date }}~${{ steps.l2f.outputs.target_date }}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --input-root "${GP_REPOS_ROOT}/gp-lhb/data/lhb/stock_daily" \
            --summary-output "${RUNNER_TEMP}/lhb-l2f-summary.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Sync gp-lhb-derived
        run: python -m my_stock common sync-repo gp-lhb-derived

      - name: Publish future
        run: |
          if [ ! -f "${RUNNER_TEMP}/lhb-l2f-summary.json" ]; then
            echo "No L2F summary produced, skip publish"
            exit 0
          fi
          python -m my_stock lhb publish-stock-daily \
            --summary-path "${RUNNER_TEMP}/lhb-l2f-summary.json" \
            --target-repo gp-lhb-derived \
            --repo-subdir future
