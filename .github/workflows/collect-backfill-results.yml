name: 回填结果汇总

on:
  workflow_dispatch:
    inputs:
      module:
        description: "模块: announce / pankou / lhb"
        required: true
        type: choice
        options:
          - announce
          - pankou
          - lhb
      stage:
        description: "阶段 (announce: l0-list/l0-content/l1/l2h; pankou: l1/l2h/l2f; lhb: l0/l1/l2h/l2f)"
        required: true
        type: string
      owners:
        description: "逗号分隔的 owner 列表（可选，留空则处理全部 owner）"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: collect-backfill-${{ github.event.inputs.module }}-${{ github.event.inputs.stage }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
      INPUT_MODULE: ${{ github.event.inputs.module }}
      INPUT_STAGE: ${{ github.event.inputs.stage }}
      INPUT_OWNERS: ${{ github.event.inputs.owners }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Collect from action-private repos and merge to canonical
        run: |
          cmd="python -m my_stock ${INPUT_MODULE} collect-backfill-results --stage ${INPUT_STAGE}"
          if [ -n "${INPUT_OWNERS}" ]; then
            cmd="${cmd} --owners ${INPUT_OWNERS}"
          fi
          eval "$cmd"
