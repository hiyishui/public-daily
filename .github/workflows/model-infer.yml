# 功能：
# - 每个交易日收盘后运行最新模型推理，并把全市场 as-of 推理结果发布到 larkself/gp-infer。
# - 同步构建 gp-reports 模型推理页面壳，使 https://gp-reports.pages.dev/model-infer/ 可通过 PAT 动态读取私有 gp-infer。
# - gp-infer 永久保留每日 predictions.parquet/index/candidates，stocks JSON 交互缓存仅保留最近若干交易日。
#
# 用法：
# - 支持 workflow_dispatch 手动补跑指定 end。
# - 支持 schedule 自动运行；prepare 步骤会用交易日历和收盘保护跳过非交易日或未收盘日期。

name: 模型推理发布

on:
  workflow_dispatch:
    inputs:
      end:
        description: "可选截止交易日 YYYY-MM-DD / YYYYMMDD；留空=当天收盘后"
        required: false
        default: ""
        type: string
      top_per_stage:
        description: "每个阶段导出的 Top N 候选"
        required: false
        default: "20"
        type: string
      history_bars:
        description: "每只股票交互 K 线缓存的历史交易日数量"
        required: false
        default: "488"
        type: string
      stock_cache_retention_days:
        description: "保留 stocks JSON 缓存的最近交易日数量"
        required: false
        default: "60"
        type: string
  schedule:
    # 21:45 Asia/Shanghai on weekdays. The prepare step still checks the
    # exchange calendar, so holidays are handled by trade_date.json.
    - cron: "45 13 * * 1-5"

permissions:
  contents: read

concurrency:
  group: model-infer-publish
  cancel-in-progress: false

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_INFER_REPO: gp-infer
      GP_REPORT_SITE_REPO: gp-reports
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      PYTHONUNBUFFERED: "1"
      INPUT_END: ${{ github.event.inputs.end || '' }}
      INPUT_TOP_PER_STAGE: ${{ github.event.inputs.top_per_stage || '20' }}
      INPUT_HISTORY_BARS: ${{ github.event.inputs.history_bars || '488' }}
      INPUT_STOCK_CACHE_RETENTION_DAYS: ${{ github.event.inputs.stock_cache_retention_days || '60' }}

    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: my-stock-src/pyproject.toml

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[ml]' && break || sleep 5; done

      - name: Resolve target date
        id: range
        run: |
          python -m my_stock common resolve-date-range \
            --date-range "${INPUT_END}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --workflow-name "model-infer-publish" \
            --precision day \
            --check-close \
            --github-output "$GITHUB_OUTPUT"

      - name: Print skip reason
        if: steps.range.outputs.should_run != 'true'
        run: echo "${{ steps.range.outputs.skip_reason }}"

      - name: Resolve inference lookback start
        if: steps.range.outputs.should_run == 'true'
        id: lookback
        run: |
          python -m my_stock common resolve-lookback-date \
            --date "${{ steps.range.outputs.end }}" \
            --lookback "${INPUT_HISTORY_BARS}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Run full-market inference
        if: steps.range.outputs.should_run == 'true'
        run: |
          python -m my_stock model infer \
            --start "${{ steps.lookback.outputs.lookback_start }}" \
            --end "${{ steps.range.outputs.end }}" \
            --top-n 0 \
            --report-top-n 0 \
            --days 20 \
            --min-history-days 20 \
            --allow-missing-market-context \
            --predictions-output "${RUNNER_TEMP}/model-infer/predictions.parquet" \
            --candidates-output "${RUNNER_TEMP}/model-infer/ranked_candidates.csv" \
            --candidates-json-output "${RUNNER_TEMP}/model-infer/ranked_candidates.json" \
            --summary-output "${RUNNER_TEMP}/model-infer-summary.json"

      - name: Export and publish gp-infer data
        if: steps.range.outputs.should_run == 'true'
        run: |
          python -m my_stock model publish-infer \
            --predictions "${RUNNER_TEMP}/model-infer/predictions.parquet" \
            --ranked-candidates-csv "${RUNNER_TEMP}/model-infer/ranked_candidates.csv" \
            --ranked-candidates-json "${RUNNER_TEMP}/model-infer/ranked_candidates.json" \
            --end "${{ steps.range.outputs.end }}" \
            --top-per-stage "${INPUT_TOP_PER_STAGE}" \
            --history-bars "${INPUT_HISTORY_BARS}" \
            --window-bars 44 \
            --stock-cache-retention-days "${INPUT_STOCK_CACHE_RETENTION_DAYS}" \
            --publish \
            --summary-output "${RUNNER_TEMP}/gp-infer-publish-summary.json"

      - name: Rebuild and publish gp-reports site
        if: steps.range.outputs.should_run == 'true'
        run: |
          python -m my_stock report build-site \
            --summary-output "${RUNNER_TEMP}/report-build-site-summary.json"
          python -m my_stock report build-model-infer-site \
            --summary-output "${RUNNER_TEMP}/report-build-model-infer-site-summary.json"
          python -m my_stock report publish-site \
            --summary-output "${RUNNER_TEMP}/report-publish-site-summary.json"

      - name: Upload summaries
        if: always() && steps.range.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: model-infer-publish-${{ steps.range.outputs.end }}
          path: |
            ${{ runner.temp }}/model-infer-summary.json
            ${{ runner.temp }}/gp-infer-publish-summary.json
            ${{ runner.temp }}/report-build-site-summary.json
            ${{ runner.temp }}/report-build-model-infer-site-summary.json
            ${{ runner.temp }}/report-publish-site-summary.json
            ${{ runner.temp }}/model-infer/ranked_candidates.csv
            ${{ runner.temp }}/model-infer/ranked_candidates.json
          if-no-files-found: warn
          retention-days: 14
