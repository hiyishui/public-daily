name: 老师标签自动向后生成

on:
  workflow_dispatch:
    inputs:
      anchor_date:
        description: "锚点交易日 YYYYMMDD / YYYY-MM-DD；留空=当天，非交易日跳过"
        required: false
        default: ""
        type: string
  schedule:
    # 21:30 Asia/Shanghai on weekdays. The prepare step still checks the
    # exchange calendar, so holidays and weekend-like makeup days are handled
    # by trade_date.json rather than by cron alone.
    - cron: "30 13 * * 1-5"

permissions:
  contents: read

concurrency:
  group: labeling-forward-labels-${{ github.repository_owner }}
  cancel-in-progress: false

jobs:
  generate-label:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_CODE_REPO: my-stock
      GP_DERIVED_REPO: gp-derived
      GP_LHB_DERIVED_REPO: gp-lhb-derived
      GP_ANNOUNCE_DERIVED_REPO: gp-announce-derived
      GP_LABELS_REPO: gp-labels
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      PYTHONUNBUFFERED: "1"
      INPUT_ANCHOR_DATE: ${{ github.event.inputs.anchor_date || '' }}
      LABEL_TARGET_OFFSET: "21"

    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Resolve target date
        id: target
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          try:
              from zoneinfo import ZoneInfo
          except ImportError:  # pragma: no cover
              ZoneInfo = None

          cn_tz = ZoneInfo("Asia/Shanghai") if ZoneInfo else timezone(timedelta(hours=8))
          payload = json.loads(Path("my-stock-src/data/basic/trade_date.json").read_text(encoding="utf-8"))
          raw_dates = payload.get("trade_dates", payload)
          trade_dates = sorted(
              {
                  str(value).strip()[:10].replace("-", "")
                  for value in raw_dates
                  if str(value).strip()
              }
          )
          trade_set = set(trade_dates)
          anchor_input = os.environ.get("INPUT_ANCHOR_DATE", "").strip().replace("-", "")
          anchor = anchor_input or datetime.now(cn_tz).strftime("%Y%m%d")
          offset = int(os.environ.get("LABEL_TARGET_OFFSET", "21"))

          if anchor not in trade_set:
              print("has_work=false")
              print(f"skip_reason={anchor} 不是交易日，跳过老师标签生成")
              print(f"anchor_date={anchor}")
              raise SystemExit(0)

          anchor_index = trade_dates.index(anchor)
          target_index = anchor_index - offset
          if target_index < 0:
              print("has_work=false")
              print(f"skip_reason=交易日历不足以从 {anchor} 向前 {offset} 个交易日")
              print(f"anchor_date={anchor}")
              raise SystemExit(0)

          target = trade_dates[target_index]
          print("has_work=true")
          print(f"anchor_date={anchor}")
          print(f"target_date={target}")
          print(f"date_source={target}~{target}")
          PY

      - name: Print skip reason
        if: steps.target.outputs.has_work != 'true'
        run: echo "${{ steps.target.outputs.skip_reason }}"

      - name: Set up Python
        if: steps.target.outputs.has_work == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: my-stock-src/pyproject.toml

      - name: Install project dependencies
        if: steps.target.outputs.has_work == 'true'
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync label input repos
        if: steps.target.outputs.has_work == 'true'
        run: |
          python -m my_stock common sync-repo gp-derived
          python -m my_stock common sync-repo gp-lhb-derived
          python -m my_stock common sync-repo gp-announce-derived

      - name: Generate and publish labels
        if: steps.target.outputs.has_work == 'true'
        run: |
          python -m my_stock labeling generate \
            --date "${{ steps.target.outputs.target_date }}" \
            --summary-output "${RUNNER_TEMP}/generate-labels-summary.json"

      - name: Validate generated rows
        if: steps.target.outputs.has_work == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = Path(os.environ["RUNNER_TEMP"]) / "generate-labels-summary.json"
          payload = json.loads(summary.read_text(encoding="utf-8"))
          rows = int(payload.get("rows") or 0)
          if rows <= 0:
              raise SystemExit(f"no labels generated for {payload.get('target_dates')}")
          print(json.dumps({
              "target_dates": payload.get("target_dates"),
              "rows": rows,
              "skipped_missing_future_rows": payload.get("skipped_missing_future_rows"),
              "pushed": payload.get("pushed"),
          }, ensure_ascii=False, indent=2))
          PY

      - name: Upload summary
        if: always() && steps.target.outputs.has_work == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generate-labels-summary-${{ steps.target.outputs.target_date }}
          path: ${{ runner.temp }}/generate-labels-summary.json
          if-no-files-found: warn
          retention-days: 14
