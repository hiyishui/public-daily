name: 老师标签 v2 流水线 (labeling)

# 与本地 scripts/labeling_pipeline.py 等价的 CI 版本：
#   sync-repos → generate (no-push) → audit → quality-report → [publish]
# 适合本地下载数据慢的场景，远端 runner 直接拉 5 个数据源仓走 HTTPS+PAT。

on:
  workflow_dispatch:
    inputs:
      target_dates:
        description: "日期，支持 YYYYMMDD / YYYYMMDD~YYYYMMDD / 逗号组合"
        required: true
        type: string
      publish:
        description: "审计通过后是否推送到 larkself/gp-labels (data/labels/<YYYY>/<YYYYMM>/<YYYYMMDD>.parquet)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      no_board:
        description: "不加载板块特征 (gp-board)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      no_lhb:
        description: "不加载龙虎榜特征 (gp-lhb)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      no_announce:
        description: "不加载公告特征 (gp-announce-features)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      policy_path:
        description: "自定义 policy.yaml 相对 my-stock-src 路径，留空使用内置默认"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: labeling-pipeline-${{ github.repository }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
      INPUT_TARGET_DATES: ${{ github.event.inputs.target_dates }}
      INPUT_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
      INPUT_NO_BOARD: ${{ github.event.inputs.no_board || 'false' }}
      INPUT_NO_LHB: ${{ github.event.inputs.no_lhb || 'false' }}
      INPUT_NO_ANNOUNCE: ${{ github.event.inputs.no_announce || 'false' }}
      INPUT_POLICY_PATH: ${{ github.event.inputs.policy_path || '' }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"
          echo "WORK_DIR=${RUNNER_TEMP}/labeling-v2" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync data source repos
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${WORK_DIR}"
          repos=(gp-derived gp-board gp-lhb gp-announce-features)
          if [ "${INPUT_NO_BOARD}" = "true" ]; then
            repos=("${repos[@]/gp-board}")
          fi
          if [ "${INPUT_NO_LHB}" = "true" ]; then
            repos=("${repos[@]/gp-lhb}")
          fi
          if [ "${INPUT_NO_ANNOUNCE}" = "true" ]; then
            repos=("${repos[@]/gp-announce-features}")
          fi
          for repo in "${repos[@]}"; do
            [ -z "${repo}" ] && continue
            echo "── sync ${repo}"
            python -m my_stock common sync-repo "${repo}"
          done

      - name: Generate labels (dry-run)
        shell: bash
        run: |
          set -euo pipefail
          policy_arg=()
          if [ -n "${INPUT_POLICY_PATH}" ]; then
            policy_arg=(--policy "${GITHUB_WORKSPACE}/my-stock-src/${INPUT_POLICY_PATH}")
          fi
          extra=()
          [ "${INPUT_NO_BOARD}" = "true" ]    && extra+=(--no-board)
          [ "${INPUT_NO_LHB}" = "true" ]      && extra+=(--no-lhb)
          [ "${INPUT_NO_ANNOUNCE}" = "true" ] && extra+=(--no-announce)
          python -m my_stock labeling generate \
            --target-dates "${INPUT_TARGET_DATES}" \
            --no-push \
            --output-root "${WORK_DIR}/labels" \
            --summary-output "${WORK_DIR}/gen_summary.json" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            "${policy_arg[@]}" "${extra[@]}"

      - name: Audit labels
        shell: bash
        run: |
          set -euo pipefail
          python -m my_stock labeling audit \
            --label-dir "${WORK_DIR}/labels" \
            --target-dates "${INPUT_TARGET_DATES}" \
            --output-root "${WORK_DIR}/audit" \
            --summary-output "${WORK_DIR}/audit_summary.json"

      - name: Quality report
        shell: bash
        run: |
          set -euo pipefail
          python -m my_stock labeling quality-report \
            --label-dir "${WORK_DIR}/labels" \
            --output "${WORK_DIR}/label_quality_report.md"

      - name: Check leakage
        id: leakage
        shell: bash
        run: |
          set -euo pipefail
          file="${WORK_DIR}/audit/audit_leakage.md"
          if [ ! -f "${file}" ]; then
            echo "leakage_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::audit_leakage.md 不存在"
            exit 0
          fi
          if grep -qF 'no `future_*` references' "${file}"; then
            echo "leakage_ok=true" >> "$GITHUB_OUTPUT"
            echo "leakage check OK"
          else
            echo "leakage_ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::leakage 检查未通过，详见 audit_leakage.md"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labeling-v2-${{ github.run_id }}
          path: |
            ${{ env.WORK_DIR }}/labels
            ${{ env.WORK_DIR }}/audit
            ${{ env.WORK_DIR }}/label_quality_report.md
            ${{ env.WORK_DIR }}/gen_summary.json
            ${{ env.WORK_DIR }}/audit_summary.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to gp-labels
        if: env.INPUT_PUBLISH == 'true' && steps.leakage.outputs.leakage_ok == 'true'
        shell: bash
        run: |
          set -euo pipefail
          policy_arg=()
          if [ -n "${INPUT_POLICY_PATH}" ]; then
            policy_arg=(--policy "${GITHUB_WORKSPACE}/my-stock-src/${INPUT_POLICY_PATH}")
          fi
          extra=()
          [ "${INPUT_NO_BOARD}" = "true" ]    && extra+=(--no-board)
          [ "${INPUT_NO_LHB}" = "true" ]      && extra+=(--no-lhb)
          [ "${INPUT_NO_ANNOUNCE}" = "true" ] && extra+=(--no-announce)
          python -m my_stock labeling generate \
            --target-dates "${INPUT_TARGET_DATES}" \
            --summary-output "${WORK_DIR}/publish_summary.json" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            "${policy_arg[@]}" "${extra[@]}"

      - name: Block publish on leakage
        if: env.INPUT_PUBLISH == 'true' && steps.leakage.outputs.leakage_ok != 'true'
        run: |
          echo "::error::leakage 检查未通过，已阻止 publish"
          exit 2
